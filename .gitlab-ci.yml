stages:
  - generate
  - pages

# Optional pre-step: fetch live CI status and JIRA bugs.
# Requires CI/CD variables: GITLAB_TOKEN, JIRA_TOKEN, JIRA_USER
# If variables are not set, generate.py falls back to dummy data automatically.

pages:
  stage: pages
  image: python:3.11-slim
  script:
    - python generate.py
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
